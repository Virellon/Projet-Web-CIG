<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cubic Infrastructure group</title>
</head>
<body>
    <header>
    <h1>Cubic Infrastructure</h1>
    <div id="panier-info">
        🛒 Panier : <span id="compteur-panier">0</span> articles
    </div>
</header>  
<section class="boutique">
    <div class="produit-carte">
        <h3>Grade VIP</h3>
        <p id="prix">Prix : 15€</p>
        <button id="btnAjoutVip" class="btn-ajout" data-nom="Grade VIP" data-prix="15">
            Ajouter au panier
        </button>
    </div>

    <div class="produit-carte">
        <h3>Kit Diamant</h3>
        <p>Prix : 5€</p>
        <button id="btnAjoutKit" class="btn-ajout">
            Ajouter au panier
        </button>
    </div>
</section>
<section id="affichage-panier">
    <h2>Votre sélection :</h2>
    <ul id="liste-panier">
        </ul>
        <div id="tots"><p>Total : <span id="total-prix">0</span>€</p></div>
<div id="center-div">
  <div class="dot online"></div>
<span>Online</span>
  <br>
  <div class="dot offline"></div>
<span>Offline</span>
</section>

<script src="script.js"></script>


</body>
</html>
